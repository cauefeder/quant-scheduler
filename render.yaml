services:
  - type: worker
    name: quant-bot
    runtime: python
    buildCommand: pip install uv
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # set manually in Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: PYTHONUTF8
        value: "1"
      - key: PYTHONIOENCODING
        value: utf-8
